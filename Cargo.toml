[package]
name = "mcpmate"
version = "0.1.0"
edition = "2021"
description = "MCPMate - A comprehensive management center for Model Context Protocol (MCP) servers"
authors = ["Loocor <loocor@gmail.com>"]

[lib]
name = "mcpmate"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
dotenvy = "0.15.7"
json5 = "0.4"
rmcp = { git = "https://github.com/modelcontextprotocol/rust-sdk.git", rev = "57e14c56e85deebc434eb11e4866e3f5ec77d906", features = [
  "server",
  "client",
  "macros",
  "transport-io",
  "transport-child-process",
  "transport-sse",
  "transport-sse-server",
  "transport-streamable-http-server",
] }
schemars = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = "0.8.3"
chrono = "0.4"
once_cell = "1.19"
thiserror = "1.0"
tokio = { version = "1.44", features = ["full"] }
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.7", features = ["v4", "serde"] }
sysinfo = "0.30.5"

[[bin]]
name = "proxy"
path = "src/bin/proxy.rs"

[[bin]]
name = "bridge"
path = "src/bin/bridge.rs"
