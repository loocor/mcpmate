[package]
name = "mcp-client"
version = "0.1.0"
edition = "2021"
description = "A Rust implementation of MCP client and server"
authors = ["Loocor <loocor@gmail.com>"]

[dependencies]
rmcp = { version = "0.1", features = ["server", "client", "macros", "transport-io", "transport-child-process"] }
schemars = "0.8"
tokio = { version = "1.44", features = ["full"] }
json5 = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4.5", features = ["derive"] }

[[bin]]
name = "mcp-server"
path = "src/bin/mcp_server.rs"

[[bin]]
name = "mcp-client"
path = "src/bin/mcp_client.rs"
