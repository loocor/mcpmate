[package]
name = "mcp-client"
version = "0.1.0"
edition = "2021"
description = "A Rust implementation of MCP client and server"
authors = ["Loocor <loocor@gmail.com>"]

[lib]
name = "mcp_client"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
dotenvy = "0.15.7"
json5 = "0.4"
rmcp = { version = "0.1", features = ["server", "client", "macros", "transport-io", "transport-child-process", "transport-sse", "transport-sse-server"] }
schemars = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = "0.7"
chrono = "0.4"
thiserror = "1.0"
tokio = { version = "1.44", features = ["full"] }
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bin]]
name = "mcp-server"
path = "src/bin/mcp_server.rs"

[[bin]]
name = "mcp-client"
path = "src/bin/mcp_client.rs"

[[bin]]
name = "mcp-proxy"
path = "src/bin/mcp_proxy.rs"
