[package]
name = "mcpman"
version = "0.1.0"
edition = "2021"
description = "MCPMan - A comprehensive management center for Model Context Protocol (MCP) servers"
authors = ["Loocor <loocor@gmail.com>"]

[lib]
name = "mcpman"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
dotenvy = "0.15.7"
json5 = "0.4"
rmcp = { version = "0.1", features = ["server", "client", "macros", "transport-io", "transport-child-process", "transport-sse", "transport-sse-server"] }
schemars = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
axum = "0.7"
chrono = "0.4"
thiserror = "1.0"
tokio = { version = "1.44", features = ["full"] }
tokio-util = "0.7"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.7", features = ["v4", "serde"] }

[[bin]]
name = "mcpman-proxy"
path = "src/bin/mcp_proxy.rs"
