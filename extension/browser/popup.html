<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>MCPMate</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<main class="shell">
			<button type="button" class="refresh-float-button" id="refresh-button">
				<span class="button-icon" data-icon="refresh" aria-hidden="true"></span>
			</button>
			<button type="button" class="settings-float-button" id="settings-button">
				<span class="button-icon" data-icon="settings" aria-hidden="true"></span>
			</button>
			<header class="header">
				<div class="brand">
					<img src="icons/logo.svg" alt="" class="logo" />
				</div>
				<div class="header-copy">
					<h1>
						<span id="popup-title">MCPMate</span>
						<sup class="beta-badge">Beta</sup>
					</h1>
					<p id="popup-copy">Curated MCP resources from MCPMate.</p>
				</div>
			</header>

			<nav class="tabs" aria-label="Discovery sections">
				<button type="button" class="tab is-active" data-panel-target="portals" id="tab-portals">Portals</button>
				<button type="button" class="tab" data-panel-target="servers" id="tab-servers">Servers</button>
				<button type="button" class="tab" data-panel-target="clients" id="tab-clients">Clients</button>
			</nav>

			<div class="content" id="content-area">
				<div class="refresh-indicator" id="refresh-indicator" aria-live="polite"></div>

				<section class="panel is-active" data-panel="portals" aria-label="MCP portals">
					<div class="status" id="portal-status">Loading portal recommendations...</div>
					<div class="list" id="portal-list"></div>
					<div class="list-footer" id="portal-footer"></div>
					<div class="pagination-sentinel" id="portal-sentinel" aria-hidden="true"></div>
				</section>

				<section class="panel" data-panel="servers" aria-label="MCP servers">
					<div class="status" id="server-status">Loading server recommendations...</div>
					<div class="list" id="server-list"></div>
					<div class="list-footer" id="server-footer"></div>
					<div class="pagination-sentinel" id="server-sentinel" aria-hidden="true"></div>
				</section>

				<section class="panel" data-panel="clients" aria-label="MCP clients">
					<div class="status" id="client-status">Loading client recommendations...</div>
					<div class="list" id="client-list"></div>
					<div class="list-footer" id="client-footer"></div>
					<div class="pagination-sentinel" id="client-sentinel" aria-hidden="true"></div>
				</section>

				<section class="panel" data-panel="settings" aria-label="Extension settings">
					<div class="settings-card">
						<label class="field" for="language-select">
							<span id="language-label">Language</span>
							<select id="language-select">
								<option value="en">English</option>
								<option value="zh-cn">中文</option>
								<option value="ja">日本語</option>
							</select>
						</label>
						<label class="field" for="theme-select">
							<span id="theme-label">Theme</span>
							<select id="theme-select">
								<option value="system" id="theme-system-option">System</option>
								<option value="light" id="theme-light-option">Light</option>
								<option value="dark" id="theme-dark-option">Dark</option>
							</select>
						</label>
					</div>
					<div class="build-date" id="build-date"></div>
				</section>
			</div>

			<footer class="footer">
				<div class="footer-links">
					<button type="button" class="discord-button" data-open-url="https://discord.gg/pc5YfEVbKj" id="discord-button">
						<span class="button-icon" data-icon="discord" aria-hidden="true"></span>
						<span id="discord-label">Discord</span>
					</button>
					<button type="button" class="icon-button" data-open-url="https://mcp.umate.ai" id="website-button">
						<span class="button-icon" data-icon="globe" aria-hidden="true"></span>
					</button>
					<button type="button" class="icon-button" data-open-url="https://github.com/loocor/mcpmate" id="github-button">
						<span class="button-icon" data-icon="github" aria-hidden="true"></span>
					</button>
				</div>
			</footer>
		</main>
		<script src="build-info.js"></script>
		<script src="config.js"></script>
		<script type="module" src="popup.js"></script>
	</body>
</html>
