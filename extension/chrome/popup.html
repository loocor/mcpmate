<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>MCPMate Discovery</title>
		<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<main class="shell">
			<header class="header">
				<img src="icons/logo.svg" alt="" class="logo" />
				<div>
					<h1>MCPMate Discovery</h1>
					<p>Find useful MCP resources faster.</p>
				</div>
			</header>

			<nav class="tabs" aria-label="Discovery sections">
				<button type="button" class="tab is-active" data-tab="portals">Portals</button>
				<button type="button" class="tab" data-tab="servers">Top Servers</button>
				<button type="button" class="tab" data-tab="clients">Top Clients</button>
			</nav>

			<section class="panel is-active" data-panel="portals" aria-label="MCP portals">
				<div class="list" id="portal-list"></div>
			</section>

			<section class="panel" data-panel="servers" aria-label="Top MCP servers">
				<div class="status" id="server-status">Loading server recommendations...</div>
				<div class="list" id="server-list"></div>
			</section>

			<section class="panel" data-panel="clients" aria-label="Top MCP clients">
				<div class="list" id="client-list"></div>
			</section>

			<footer class="footer">
				<button type="button" data-open-url="https://github.com/loocor/mcpmate">
					GitHub Repo
				</button>
				<button type="button" data-open-url="https://mcp.umate.ai">
					Official Website
				</button>
			</footer>
		</main>
		<script src="config.js"></script>
		<script src="popup.js"></script>
	</body>
</html>
