# Tag-driven desktop release workflow.
# Triggered on v* tags; builds all desktop platforms, collects updater artifacts,
# generates update.json, and publishes a GitHub Release.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI: "true"

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.classify.outputs.tag }}
      version: ${{ steps.classify.outputs.version }}
      release-channel: ${{ steps.classify.outputs.release-channel }}
      app-version: ${{ steps.classify.outputs.app-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Classify supported release tag
        id: classify
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          classification=$(bun packaging/desktop/release-tag.ts --tag "$RELEASE_TAG")
          echo "tag=$(jq -r '.tag' <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "release-channel=$(jq -r '.releaseChannel' <<< "$classification")" >> "$GITHUB_OUTPUT"
          echo "app-version=$(jq -r '.appVersion' <<< "$classification")" >> "$GITHUB_OUTPUT"

      - name: Validate dispatch tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if ! git ls-remote --exit-code --tags --refs "https://github.com/${REPOSITORY}.git" "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Tag ${RELEASE_TAG} does not exist in ${REPOSITORY}" >&2
            exit 1
          fi

      - name: Validate distribution credentials
        env:
          DOWNLOADS_WORKFLOW_TOKEN: ${{ secrets.DOWNLOADS_WORKFLOW_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          test -n "$DOWNLOADS_WORKFLOW_TOKEN" || { echo "missing DOWNLOADS_WORKFLOW_TOKEN" >&2; exit 1; }
          test -n "$HOMEBREW_TAP_TOKEN" || { echo "missing HOMEBREW_TAP_TOKEN" >&2; exit 1; }

  # ---------------------------------------------------------------------------
  # Desktop builds — one per platform/arch target
  # ---------------------------------------------------------------------------
  build-macos:
    needs: validate-tag
    name: macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
          - arch: x64
            runner: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup build environment
        uses: ./.github/actions/setup-desktop-build
        with:
          rust-target: ${{ matrix.target }}

      - name: Inject version from tag
        uses: ./.github/actions/inject-version
        with:
          release-tag: ${{ needs.validate-tag.outputs.tag }}

      - name: Validate macOS signing/notarization secrets
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          test -n "$APPLE_CERTIFICATE_P12_BASE64" || { echo "missing APPLE_CERTIFICATE_P12_BASE64" >&2; exit 1; }
          test -n "$APPLE_CERTIFICATE_PASSWORD" || { echo "missing APPLE_CERTIFICATE_PASSWORD" >&2; exit 1; }
          test -n "$KEYCHAIN_PASSWORD" || { echo "missing KEYCHAIN_PASSWORD" >&2; exit 1; }
          test -n "$APPLE_SIGNING_IDENTITY" || { echo "missing APPLE_SIGNING_IDENTITY" >&2; exit 1; }

          has_api_key=0
          if [[ -n "$APPLE_API_KEY" && -n "$APPLE_API_ISSUER" && -n "$APPLE_API_PRIVATE_KEY" ]]; then
            has_api_key=1
          fi

          has_apple_id=0
          if [[ -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            has_apple_id=1
          fi

          if [[ "$has_api_key" -eq 0 && "$has_apple_id" -eq 0 ]]; then
            echo "missing notarization credentials: set API key triple or Apple ID triple" >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/mcpmate-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/mcpmate-signing-cert.p12"

          if ! echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare notary API key file
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "$APPLE_API_KEY" || -z "$APPLE_API_ISSUER" || -z "$APPLE_API_PRIVATE_KEY" ]]; then
            echo "App Store Connect API key credentials not configured; using Apple ID notarization credentials."
            exit 0
          fi

          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build macOS DMG
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          chmod +x packaging/desktop/macos-build-tauri-release.sh
          packaging/desktop/macos-build-tauri-release.sh \
            --profile release \
            --target "${{ matrix.target }}" \
            --bundles app,dmg \
            --with-updater \
            --output-dir "${GITHUB_WORKSPACE}/installers"

      - name: Verify macOS notarization and codesign
        run: |
          set -euo pipefail

          shopt -s nullglob
          dmgs=(installers/*.dmg)
          if [[ ${#dmgs[@]} -eq 0 ]]; then
            echo "no DMG generated for notarization verification" >&2
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            echo "verify stapler for $dmg"
            xcrun stapler validate "$dmg"

            mount_dir="$RUNNER_TEMP/mcpmate-dmg-mount"
            mkdir -p "$mount_dir"
            hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
            trap 'hdiutil detach "$mount_dir" -quiet || true' EXIT

            app_path=$(find "$mount_dir" -maxdepth 2 -type d -name "*.app" | head -n 1)
            if [[ -z "$app_path" ]]; then
              echo "no .app found inside $dmg" >&2
              exit 1
            fi

            echo "verify codesign for $app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
            spctl --assess --type execute --verbose=4 "$app_path"

            hdiutil detach "$mount_dir" -quiet || true
            trap - EXIT
          done

      - name: Cleanup macOS signing materials
        if: always()
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/mcpmate-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/mcpmate-signing-cert.p12"

          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$CERT_PATH"
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8

      - name: List macOS bundles (debug)
        run: |
          find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle" \
            -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" \) \
            | sort || true

      - name: Collect updater artifacts
        id: collect-updater
        uses: ./.github/actions/collect-updater
        with:
          bundle-dir: "desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          output-dir: "${{ github.workspace }}/updater"
          platform: macos

      - name: Normalize macOS artifact names
        env:
          APP_VERSION: ${{ needs.validate-tag.outputs.app-version }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          shopt -s nullglob

          VERSION="$APP_VERSION"
          case "$TARGET_ARCH" in
            aarch64) ARCH_SUFFIX="aarch64" ;;
            x64) ARCH_SUFFIX="x86_64" ;;
            *) echo "unknown macOS arch: $TARGET_ARCH" >&2; exit 1 ;;
          esac

          for dmg in installers/*.dmg; do
            mv "$dmg" "installers/MCPMate_${VERSION}_darwin_${ARCH_SUFFIX}.dmg"
          done

          for bundle in updater/*.app.tar.gz; do
            dest="updater/MCPMate_${VERSION}_darwin_${ARCH_SUFFIX}.app.tar.gz"
            mv "$bundle" "$dest"
            if [[ -f "${bundle}.sig" ]]; then
              mv "${bundle}.sig" "${dest}.sig"
            fi
          done

      - name: Upload installers
        uses: actions/upload-artifact@v6
        with:
          name: installers-macos-${{ matrix.arch }}
          path: installers/*
          if-no-files-found: error

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v6
        with:
          name: updater-macos-${{ matrix.arch }}
          path: updater/*
          if-no-files-found: error

  build-windows:
    needs: validate-tag
    name: Windows (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup build environment
        uses: ./.github/actions/setup-desktop-build
        with:
          rust-target: ${{ matrix.target }}

      - name: Inject version from tag
        uses: ./.github/actions/inject-version
        with:
          release-tag: ${{ needs.validate-tag.outputs.tag }}

      - name: Build Windows installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          chmod +x packaging/desktop/windows-build-tauri-release.sh
          packaging/desktop/windows-build-tauri-release.sh \
            --profile release \
            --target "${{ matrix.target }}" \
            --bundles msi \
            --with-updater \
            --output-dir "${GITHUB_WORKSPACE}/installers"

      - name: List Windows bundles (debug)
        shell: bash
        run: |
          find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle" \
            -type f \
            \( -name "*.msi" -o -name "*.msi.zip" -o -name "*.nsis.zip" -o -name "*.sig" \) \
            | sort || true

      - name: Collect updater artifacts
        id: collect-updater
        uses: ./.github/actions/collect-updater
        with:
          bundle-dir: "desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          output-dir: "${{ github.workspace }}/updater"
          platform: windows

      - name: Validate updater artifacts
        shell: bash
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          HAS_UPDATER: ${{ steps.collect-updater.outputs.has-updater }}
        run: |
          if [[ "$HAS_UPDATER" == "true" ]]; then
            exit 0
          fi

          echo "::error::No updater artifacts found for Windows ${TARGET_ARCH} target" >&2
          exit 1

      - name: Collect installer artifacts
        id: collect-installers
        shell: bash
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p installers

          found=false
          while IFS= read -r -d '' installer; do
            cp "$installer" installers/
            found=true
          done < <(find "desktop/src-tauri/target/${TARGET_TRIPLE}/release/bundle" -type f -name "*.msi" -print0 2>/dev/null)

          echo "has-installers=$found" >> "$GITHUB_OUTPUT"

          if [[ "$found" == "true" ]]; then
            echo "Collected installer artifacts:"
            ls -lh installers/
          else
            echo "::error::No installer artifacts found for Windows ${TARGET_ARCH} target" >&2
            exit 1
          fi

      - name: Upload installers
        if: steps.collect-installers.outputs.has-installers == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: installers-windows-${{ matrix.arch }}
          path: installers/*
          if-no-files-found: error

      - name: Upload updater artifacts
        if: steps.collect-updater.outputs.has-updater == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: updater-windows-${{ matrix.arch }}
          path: updater/*
          if-no-files-found: error

  build-linux:
    needs: validate-tag
    name: Linux (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
          - arch: arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential file jq xdg-utils \
            libayatana-appindicator3-dev libfuse2 librsvg2-dev \
            libgtk-3-dev libssl-dev libwebkit2gtk-4.1-dev patchelf

      - name: Setup build environment
        uses: ./.github/actions/setup-desktop-build
        with:
          rust-target: ${{ matrix.target }}

      - name: Inject version from tag
        uses: ./.github/actions/inject-version
        with:
          release-tag: ${{ needs.validate-tag.outputs.tag }}

      - name: Build Linux bundles
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          chmod +x packaging/desktop/linux-build-tauri-release.sh
          packaging/desktop/linux-build-tauri-release.sh \
            --profile release \
            --target "${{ matrix.target }}" \
            --bundles "${{ matrix.bundles }}" \
            --with-updater \
            --output-dir "${GITHUB_WORKSPACE}/installers"

      - name: List Linux bundles (debug)
        run: |
          find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle" \
            -type f \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.sig" \) \
            | sort || true

      - name: Collect updater artifacts
        if: contains(matrix.bundles, 'appimage')
        uses: ./.github/actions/collect-updater
        with:
          bundle-dir: "desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          output-dir: "${{ github.workspace }}/updater"
          platform: linux

      - name: Upload installers
        uses: actions/upload-artifact@v6
        with:
          name: installers-linux-${{ matrix.arch }}
          path: installers/*
          if-no-files-found: error

      - name: Upload updater artifacts
        if: contains(matrix.bundles, 'appimage')
        uses: actions/upload-artifact@v6
        with:
          name: updater-linux-${{ matrix.arch }}
          path: updater/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish release — depends on all build jobs completing
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [validate-tag, build-macos, build-windows, build-linux]
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ needs.validate-tag.outputs.tag }}
      RELEASE_CHANNEL: ${{ needs.validate-tag.outputs.release-channel }}
      APP_VERSION: ${{ needs.validate-tag.outputs.app-version }}
      RELEASE_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected artifacts
        run: find artifacts -type f | sort

      - name: Normalize release asset names
        run: |
          VERSION="$APP_VERSION"

          rename_pair() {
            local old_name="$1"
            local new_name="$2"
            if [[ -f "artifacts/${old_name}" ]]; then
              mv "artifacts/${old_name}" "artifacts/${new_name}"
            fi
            if [[ -f "artifacts/${old_name}.sig" ]]; then
              mv "artifacts/${old_name}.sig" "artifacts/${new_name}.sig"
            fi
          }

          rename_pair "MCPMate_${VERSION}_darwin_aarch64.dmg" "MCPMate_${VERSION}_macos_aarch64.dmg"
          rename_pair "MCPMate_${VERSION}_darwin_aarch64.app.tar.gz" "MCPMate_${VERSION}_macos_aarch64.app.tar.gz"
          rename_pair "MCPMate_${VERSION}_darwin_x86_64.dmg" "MCPMate_${VERSION}_macos_x86_64.dmg"
          rename_pair "MCPMate_${VERSION}_darwin_x86_64.app.tar.gz" "MCPMate_${VERSION}_macos_x86_64.app.tar.gz"
          rename_pair "MCPMate_${VERSION}_x64_en-US.msi" "MCPMate_${VERSION}_windows_x64.msi"
          rename_pair "MCPMate_${VERSION}_arm64_en-US.msi" "MCPMate_${VERSION}_windows_arm64.msi"
          rename_pair "MCPMate_${VERSION}_amd64.AppImage" "MCPMate_${VERSION}_linux_x64.AppImage"
          rename_pair "MCPMate_${VERSION}_aarch64.AppImage" "MCPMate_${VERSION}_linux_arm64.AppImage"
          rename_pair "MCPMate_${VERSION}_amd64.deb" "MCPMate_${VERSION}_linux_x64.deb"
          rename_pair "MCPMate_${VERSION}_arm64.deb" "MCPMate_${VERSION}_linux_arm64.deb"

          find artifacts -type f | sort

      - name: Assert required release assets
        run: |
          VERSION="$APP_VERSION"

          required_assets=(
            "MCPMate_${VERSION}_macos_aarch64.dmg"
            "MCPMate_${VERSION}_macos_x86_64.dmg"
            "MCPMate_${VERSION}_macos_aarch64.app.tar.gz"
            "MCPMate_${VERSION}_macos_aarch64.app.tar.gz.sig"
            "MCPMate_${VERSION}_macos_x86_64.app.tar.gz"
            "MCPMate_${VERSION}_macos_x86_64.app.tar.gz.sig"
            "MCPMate_${VERSION}_windows_x64.msi"
            "MCPMate_${VERSION}_windows_arm64.msi"
            "MCPMate_${VERSION}_linux_x64.AppImage"
            "MCPMate_${VERSION}_linux_x64.AppImage.sig"
            "MCPMate_${VERSION}_linux_x64.deb"
            "MCPMate_${VERSION}_linux_arm64.AppImage"
            "MCPMate_${VERSION}_linux_arm64.AppImage.sig"
            "MCPMate_${VERSION}_linux_arm64.deb"
          )

          missing=0
          for asset in "${required_assets[@]}"; do
            if [[ ! -f "artifacts/${asset}" ]]; then
              echo "::error::Missing required release asset: ${asset}" >&2
              missing=1
            fi
          done

          x64_msi_sig="artifacts/MCPMate_${VERSION}_windows_x64.msi.sig"
          x64_msi_zip="artifacts/MCPMate_${VERSION}_windows_x64.msi.zip"
          x64_msi_zip_sig="artifacts/MCPMate_${VERSION}_windows_x64.msi.zip.sig"

          if [[ ! -f "$x64_msi_sig" && ! -f "$x64_msi_zip_sig" ]]; then
            echo "::error::Missing required release asset: MCPMate_${VERSION}_windows_x64.msi.sig or MCPMate_${VERSION}_windows_x64.msi.zip.sig" >&2
            missing=1
          fi

          if [[ -f "$x64_msi_zip_sig" && ! -f "$x64_msi_zip" ]]; then
            echo "::error::Missing required release asset: MCPMate_${VERSION}_windows_x64.msi.zip" >&2
            missing=1
          fi

          arm64_msi_zip="artifacts/MCPMate_${VERSION}_windows_arm64.msi.zip"
          arm64_msi_sig="artifacts/MCPMate_${VERSION}_windows_arm64.msi.sig"
          arm64_msi_zip_sig="artifacts/MCPMate_${VERSION}_windows_arm64.msi.zip.sig"

          if [[ ! -f "$arm64_msi_sig" && ! -f "$arm64_msi_zip_sig" ]]; then
            echo "::error::Missing required release asset: MCPMate_${VERSION}_windows_arm64.msi.sig or MCPMate_${VERSION}_windows_arm64.msi.zip.sig" >&2
            missing=1
          fi

          if [[ -f "$arm64_msi_zip_sig" && ! -f "$arm64_msi_zip" ]]; then
            echo "::error::Missing required release asset: MCPMate_${VERSION}_windows_arm64.msi.zip" >&2
            missing=1
          fi

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Generate update manifest
        run: |
          chmod +x packaging/desktop/generate-update-manifest.sh

          VERSION="$APP_VERSION"

          MANIFEST_ARGS=(--version "$VERSION" --output artifacts/update.json)

          while read -r sig; do
            bundle="${sig%.sig}"
            if [[ -f "$bundle" ]]; then
              base="$(basename "$bundle")"
              case "$base" in
                *aarch64*|*arm64*)
                  case "$base" in
                    *darwin*|*macos*|*.app.tar.gz) plat="darwin-aarch64" ;;
                    *linux*|*.AppImage)            plat="linux-aarch64" ;;
                    *windows*|*.nsis*|*.msi*)      plat="windows-aarch64" ;;
                    *) echo "WARN: skip $base" >&2; continue ;;
                  esac ;;
                *)
                  case "$base" in
                    *darwin*|*macos*|*.app.tar.gz) plat="darwin-x86_64" ;;
                    *linux*|*.AppImage)            plat="linux-x86_64" ;;
                    *windows*|*.nsis*|*.msi*)      plat="windows-x86_64" ;;
                    *) echo "WARN: skip $base" >&2; continue ;;
                  esac ;;
              esac

              asset_url="https://github.com/${RELEASE_REPO}/releases/download/${RELEASE_TAG}/${base}"
              MANIFEST_ARGS+=(--platform "$plat" "$asset_url" "$(cat "$sig")")
            fi
          done < <(find artifacts -name "*.sig" -type f)

          packaging/desktop/generate-update-manifest.sh "${MANIFEST_ARGS[@]}"

          echo "--- update.json ---"
          cat artifacts/update.json

      - name: Bundle signature files
        run: |
          if compgen -G "artifacts/*.sig" >/dev/null; then
            zip -j "artifacts/signatures.zip" artifacts/*.sig
            rm -f artifacts/*.sig
          fi

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_tag=$(
            gh release list --limit 20 --exclude-pre-releases --json tagName --jq '.[].tagName' |
              grep -Fxv "$RELEASE_TAG" |
              grep -Fxv nightly |
              head -n1 || true
          )

          if [[ -n "$previous_tag" ]]; then
            gh api -X POST "repos/${RELEASE_REPO}/releases/generate-notes" \
              -f tag_name="$RELEASE_TAG" \
              -f previous_tag_name="$previous_tag" \
              --jq '.body' > artifacts/release-notes.md
            compare_range="${previous_tag}...${RELEASE_TAG}"
          else
            gh api -X POST "repos/${RELEASE_REPO}/releases/generate-notes" \
              -f tag_name="$RELEASE_TAG" \
              --jq '.body' > artifacts/release-notes.md
            compare_range=""
          fi

          if ! grep -Eq '^[*-] ' artifacts/release-notes.md; then
            if [[ -n "$compare_range" ]]; then
              mapfile -t commits < <(
                gh api "repos/${RELEASE_REPO}/compare/${compare_range}" --jq '.commits[].commit.message | split("\n")[0]' |
                  while IFS= read -r subject; do
                    case "$subject" in
                      ""|"Merge pull request"*) continue ;;
                    esac
                    printf '%s\n' "$subject"
                  done
              )
            else
              mapfile -t commits < <(git log -1 --format=%s)
            fi

            {
              printf '%s\n' "## What's Changed"
              if ((${#commits[@]})); then
                for subject in "${commits[@]}"; do
                  printf -- '- %s\n' "$subject"
                done
              else
                printf '%s\n' '- Release notes fallback generated from tag comparison.'
              fi
              printf '\n'
              cat artifacts/release-notes.md
            } > artifacts/release-notes.tmp
            mv artifacts/release-notes.tmp artifacts/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ env.RELEASE_CHANNEL == 'beta' }}
          body_path: artifacts/release-notes.md
          files: |
            artifacts/*.dmg
            artifacts/*.msi
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.app.tar.gz
            artifacts/*.nsis.zip
            artifacts/*.msi.zip
            artifacts/signatures.zip
            artifacts/update.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Synchronize exact-tag download manifest
        env:
          DOWNLOADS_WORKFLOW_TOKEN: ${{ secrets.DOWNLOADS_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail

          bun packaging/desktop/sync-release-downloads.ts \
            --tag "$RELEASE_TAG" \
            --auth-origin "https://auth.mcp.umate.ai" \
            --public-origin "https://public.mcp.umate.ai" \
            --output artifacts/release-manifest-v2.json

      - name: Render tracked release downloads
        run: |
          set -euo pipefail

          bun packaging/desktop/render-release-downloads.ts \
            --manifest artifacts/release-manifest-v2.json \
            --notes artifacts/release-notes.md \
            --tag "$RELEASE_TAG" \
            --output artifacts/release-notes.md

      - name: Update GitHub Release body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release edit "$RELEASE_TAG" \
            --repo "$RELEASE_REPO" \
            --notes-file artifacts/release-notes.md

      - name: Dispatch Homebrew Tap update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          bun packaging/desktop/dispatch-homebrew-tap.ts \
            --tag "$RELEASE_TAG" \
            --manifest-url "https://public.mcp.umate.ai/downloads/releases/$RELEASE_TAG"
