# Builds the MCPMate Tauri desktop app for macOS (DMG), without codesigning or notarization.
# Artifacts are suitable for local testing or internal distribution; Gatekeeper may warn on open.

name: Desktop (macOS Test)

on:
  workflow_dispatch:
    inputs:
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "dmg"
  push:
    branches: [test/desktop-ci]
    paths:
      - ".github/workflows/desktop-macos.yml"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    branches: [test/desktop-ci]
    paths:
      - ".github/workflows/desktop-macos.yml"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-macos-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            artifact_name: mcpmate-macos-aarch64-dmg
            artifact_path: desktop-macos-artifacts/*aarch64*.dmg
          - arch: x64
            target: x86_64-apple-darwin
            artifact_name: mcpmate-macos-x64-dmg
            artifact_path: desktop-macos-artifacts/*x64*.dmg
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            desktop/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: board/package-lock.json

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli
          locked: true

      - name: Build DMGs (no sign / no notarize)
        working-directory: desktop
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
        run: |
          chmod +x script/macos-build-tauri-release.sh
          ./script/macos-build-tauri-release.sh \
            --targets "${{ matrix.target }}" \
            --bundles "${INPUT_BUNDLES:-dmg}" \
            --skip-notarize \
            --output-dir "${GITHUB_WORKSPACE}/desktop-macos-artifacts"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 14
