# Builds the MCPMate Tauri desktop app for macOS (DMG), without codesigning or notarization.
# Artifacts are suitable for local testing or internal distribution; Gatekeeper may warn on open.

name: Desktop (macOS)

on:
  workflow_dispatch:
    inputs:
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "dmg"
  push:
    branches: [main, dev, refactor/runtime-contract-and-packaging]
    paths:
      - ".github/workflows/desktop-macos.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-macos.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
          - arch: x64
            runner: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            desktop/src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli
          locked: true

      - name: Build macOS DMG (no sign / no notarize)
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
        run: |
          chmod +x packaging/desktop/macos-build-tauri-release.sh
          packaging/desktop/macos-build-tauri-release.sh \
            --targets "${{ matrix.target }}" \
            --bundles "${INPUT_BUNDLES:-dmg}" \
            --skip-notarize \
            --output-dir "${GITHUB_WORKSPACE}/desktop-macos-artifacts/${{ matrix.arch }}"

      - name: Smoke test (sidecar arch + bundle structure)
        run: |
          set -euo pipefail
          APP_BUNDLE="desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/MCPMate.app"
          echo "--- sidecar architecture ---"
          for sc in bridge mcpmate-core; do
            bin="${APP_BUNDLE}/Contents/Frameworks/${sc}"
            test -f "$bin" || { echo "FAIL: missing sidecar $sc"; exit 1; }
            arch_info=$(file "$bin")
            echo "$sc: $arch_info"
            case "${{ matrix.arch }}" in
              aarch64) echo "$arch_info" | grep -q "arm64\|aarch64" ;;
              x64)     echo "$arch_info" | grep -q "x86_64" ;;
            esac
          done
          echo "--- bundle structure ---"
          test -f "${APP_BUNDLE}/Contents/Info.plist"
          test -f "${APP_BUNDLE}/Contents/MacOS/MCPMate"
          echo "--- codesign verify ---"
          codesign -vvv --deep --strict "$APP_BUNDLE" 2>&1 || true
          echo "SMOKE OK"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcpmate-macos-${{ matrix.arch }}-dmg
          path: desktop-macos-artifacts/${{ matrix.arch }}/*.dmg
          if-no-files-found: error
          retention-days: 14
