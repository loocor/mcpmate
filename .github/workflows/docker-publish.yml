name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: false
        default: "false"
  push:
    tags:
      - "v*"

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/loocor/mcpmate

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target

      - name: Run backend clippy
        working-directory: backend
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate registry metadata
        run: bash distribution/scripts/registry-validate.sh

      - name: Build local verification image
        run: docker build -t mcpmate:ci -f distribution/docker/Dockerfile .

      - name: Verify image label
        run: |
          test "$(docker inspect mcpmate:ci --format='{{ index .Config.Labels "io.modelcontextprotocol.server.name" }}')" = "io.github.loocor/mcpmate"

      - name: Smoke test CLI entrypoint
        run: docker run --rm mcpmate:ci --help

      - name: Smoke test bundled board and API
        run: |
          docker run -d --name mcpmate-smoke -p 13000:3000 -p 18080:8080 -p 18000:8000 mcpmate:ci
          python3 - <<'PY'
          from time import sleep
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          checks = [
              ("board", "http://127.0.0.1:13000/"),
              ("board-api", "http://127.0.0.1:13000/api/system/status"),
              ("api", "http://127.0.0.1:18080/api/system/status"),
          ]

          for label, url in checks:
              last = None
              for _ in range(20):
                  try:
                      with urlopen(url, timeout=5) as response:
                          if response.status != 200:
                              raise SystemExit(f"{label} returned {response.status}")
                          print(label, response.status)
                          break
                  except (HTTPError, URLError, TimeoutError) as exc:
                      last = exc
                      sleep(1)
              else:
                  raise SystemExit(f"{label} failed: {last}")

          try:
              req = __import__("urllib.request").request.Request(
                  "http://127.0.0.1:18000/mcp",
                  method="POST",
                  data=b'{"jsonrpc":"2.0","id":"smoke","method":"initialize","params":{}}',
                  headers={"Content-Type": "application/json"},
              )
              urlopen(req, timeout=5)
          except HTTPError as exc:
              if exc.code != 406:
                  raise
              print("mcp", exc.code)
          else:
              raise SystemExit("mcp smoke expected 406 for incomplete request")
          PY
          docker rm -f mcpmate-smoke

  build:
    needs: validate
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: distribution/docker/Dockerfile
          push: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
