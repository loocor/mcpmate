name: Desktop (Linux)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to build"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - x64
          - arm64
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "appimage,deb"
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/desktop-linux.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-linux.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event_name == 'workflow_dispatch' && (inputs.arch == 'all' && '["x64","arm64"]' || format('["{0}"]', inputs.arch)) || '["x64","arm64"]') }}
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm' }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            jq \
            xdg-utils \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Setup build environment
        uses: ./.github/actions/setup-desktop-build
        with:
          rust-target: ${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}

      - name: Build Linux desktop artifacts
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
          TAURI_BUILD_EXTRA: "--features devtools"
        run: |
          chmod +x packaging/desktop/linux-build-tauri-release.sh
          BUNDLES="${INPUT_BUNDLES:-appimage,deb}"
          packaging/desktop/linux-build-tauri-release.sh \
            --target "${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}" \
            --bundles "${BUNDLES}" \
            --output-dir "${GITHUB_WORKSPACE}/desktop-linux-artifacts/${{ matrix.arch }}"

      - name: Smoke test (sidecar arch)
        uses: ./.github/actions/verify-sidecar-arch
        with:
          bundle-dir: "desktop/src-tauri/target/${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}/release/bundle"
          target-arch: ${{ matrix.arch }}
          platform: linux
          rust-target: ${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}

      - name: Verify bundle format
        uses: ./.github/actions/verify-bundle-format
        with:
          artifacts-dir: "desktop-linux-artifacts/${{ matrix.arch }}"
          platform: linux
          bundle-types: "appimage,deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mcpmate-linux-${{ matrix.arch }}-bundles
          path: |
            desktop-linux-artifacts/${{ matrix.arch }}/*.AppImage
            desktop-linux-artifacts/${{ matrix.arch }}/*.deb
          if-no-files-found: error
          retention-days: 14
