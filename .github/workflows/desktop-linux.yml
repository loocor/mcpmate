name: Desktop (Linux)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to build"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - x64
          - arm64
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "appimage,deb"
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/desktop-linux.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-linux.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event_name == 'workflow_dispatch' && (inputs.arch == 'all' && '["x64","arm64"]' || format('["{0}"]', inputs.arch)) || '["x64","arm64"]') }}
    runs-on: ${{ matrix.arch == 'x64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm' }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            jq \
            xdg-utils \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Setup build environment
        uses: ./.github/actions/setup-desktop-build
        with:
          rust-target: ${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}

      - name: Build Linux desktop artifacts
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
          TAURI_BUILD_EXTRA: "--features devtools"
        run: |
          chmod +x packaging/desktop/linux-build-tauri-release.sh
          BUNDLES="${INPUT_BUNDLES:-appimage,deb}"
          packaging/desktop/linux-build-tauri-release.sh \
            --target "${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}" \
            --bundles "${BUNDLES}" \
            --output-dir "${GITHUB_WORKSPACE}/desktop-linux-artifacts/${{ matrix.arch }}"

      - name: Smoke test (sidecar arch + bundle format)
        run: |
          set -euo pipefail
          BUNDLE_DIR="desktop/src-tauri/target/${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}/release/bundle"
          echo "--- bundle layout ---"
          find "$BUNDLE_DIR" -type f | head -40 || true
          echo "--- sidecar architecture ---"
          for sc in bridge mcpmate-core; do
            bin=$(find "$BUNDLE_DIR" -type f \( -name "$sc" -o -name "${sc}-*" \) ! -name "*.fingerprint" | head -1) || true
            if [[ -z "$bin" ]]; then
              echo "WARN: sidecar $sc not in bundle, checking sidecar output dir"
              bin="backend/target/sidecars/${sc}-${{ matrix.arch == 'x64' && 'x86_64-unknown-linux-gnu' || 'aarch64-unknown-linux-gnu' }}"
              test -f "$bin" || { echo "FAIL: missing sidecar $sc"; exit 1; }
            fi
            echo "$sc found at: $bin"
            arch_info=$(file "$bin")
            echo "$sc: $arch_info"
            case "${{ matrix.arch }}" in
              arm64) echo "$arch_info" | grep -q "aarch64\|ARM aarch64" || { echo "FAIL: arch mismatch for $sc: $arch_info"; exit 1; } ;;
              x64)   echo "$arch_info" | grep -q "x86-64\|x86_64" || { echo "FAIL: arch mismatch for $sc: $arch_info"; exit 1; } ;;
            esac
          done
          echo "--- deb format ---"
          for deb in desktop-linux-artifacts/${{ matrix.arch }}/*.deb; do
            test -f "$deb" || { echo "SKIP: no .deb"; break; }
            dpkg-deb --info "$deb" >/dev/null
            echo "OK: $(basename "$deb")"
          done
          echo "--- AppImage format ---"
          for appimg in desktop-linux-artifacts/${{ matrix.arch }}/*.AppImage; do
            test -f "$appimg" || { echo "SKIP: no AppImage"; break; }
            head -c 4 "$appimg" | od -An -tx1 | grep -q "7f 45 4c 46" || { echo "FAIL: not an ELF"; exit 1; }
            echo "OK: $(basename "$appimg")"
          done
          echo "SMOKE OK"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mcpmate-linux-${{ matrix.arch }}-bundles
          path: |
            desktop-linux-artifacts/${{ matrix.arch }}/*.AppImage
            desktop-linux-artifacts/${{ matrix.arch }}/*.deb
          if-no-files-found: error
          retention-days: 14
