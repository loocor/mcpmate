name: Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to build"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - x64
          - arm64
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "msi"
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event_name == 'workflow_dispatch' && (inputs.arch == 'all' && '["x64","arm64"]' || format('["{0}"]', inputs.arch)) || '["x64","arm64"]') }}
    runs-on: ${{ matrix.arch == 'x64' && 'windows-latest' || 'windows-11-arm' }}
    continue-on-error: ${{ matrix.arch == 'arm64' }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup build environment
        uses: ./.github/actions/setup-desktop-build
        with:
          rust-target: ${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}

      - name: Inject MSI-safe app version
        uses: ./.github/actions/inject-version

      - name: Build Windows desktop artifacts
        shell: bash
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
          TAURI_BUILD_EXTRA: "--features devtools"
        run: |
          chmod +x packaging/desktop/windows-build-tauri-release.sh
          bash packaging/desktop/windows-build-tauri-release.sh \
            --target "${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}" \
            --bundles "${INPUT_BUNDLES:-msi}" \
            --output-dir "${GITHUB_WORKSPACE}/desktop-windows-artifacts/${{ matrix.arch }}"

      - name: Smoke test (sidecar arch)
        uses: ./.github/actions/verify-sidecar-arch
        with:
          bundle-dir: "desktop/src-tauri/target/${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}/release/bundle"
          target-arch: ${{ matrix.arch }}
          platform: windows
          rust-target: ${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}

      - name: Verify bundle format
        uses: ./.github/actions/verify-bundle-format
        with:
          artifacts-dir: "desktop-windows-artifacts/${{ matrix.arch }}"
          platform: windows
          bundle-types: "msi"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mcpmate-windows-${{ matrix.arch }}-msi
          path: |
            desktop-windows-artifacts/${{ matrix.arch }}/*.msi
          if-no-files-found: error
          retention-days: 14
