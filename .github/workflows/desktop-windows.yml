name: Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to build"
        type: choice
        required: false
        default: "all"
        options:
          - all
          - x64
          - arm64
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "msi"
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event_name == 'workflow_dispatch' && (inputs.arch == 'all' && '["x64","arm64"]' || format('["{0}"]', inputs.arch)) || '["x64","arm64"]') }}
    runs-on: ${{ matrix.arch == 'x64' && 'windows-latest' || 'windows-11-arm' }}
    continue-on-error: ${{ matrix.arch == 'arm64' }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup build environment
        uses: ./.github/actions/setup-desktop-build
        with:
          rust-target: ${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}

      - name: Inject app version
        uses: ./.github/actions/inject-version

      - name: Build Windows desktop artifacts
        shell: bash
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
          TAURI_BUILD_EXTRA: "--features devtools"
        run: |
          chmod +x packaging/desktop/windows-build-tauri-release.sh
          bash packaging/desktop/windows-build-tauri-release.sh \
            --target "${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}" \
            --bundles "${INPUT_BUNDLES:-msi}" \
            --output-dir "${GITHUB_WORKSPACE}/desktop-windows-artifacts/${{ matrix.arch }}"

      - name: Smoke test (sidecar arch + MSI format)
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="desktop/src-tauri/target/${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}/release/bundle"
          echo "--- bundle layout ---"
          find "$BUNDLE_DIR" -type f 2>/dev/null | head -40 || true
          echo "--- sidecar architecture ---"
          for sc in bridge.exe mcpmate-core.exe; do
            sc_name="${sc%.exe}"
            bin=$(find "$BUNDLE_DIR" -type f \( -name "$sc" -o -name "${sc_name}-*.exe" \) | head -1) || true
            if [[ -z "$bin" ]]; then
              echo "WARN: sidecar $sc not in bundle, checking sidecar output dir"
              bin="backend/target/sidecars/${sc_name}-${{ matrix.arch == 'x64' && 'x86_64-pc-windows-msvc' || 'aarch64-pc-windows-msvc' }}.exe"
              test -f "$bin" || { echo "FAIL: missing sidecar $sc"; exit 1; }
            fi
            echo "$sc found at: $bin"
            arch_info=$(file "$bin")
            echo "$sc: $arch_info"
            case "${{ matrix.arch }}" in
              arm64) echo "$arch_info" | grep -q "ARM64\|aarch64" || { echo "FAIL: arch mismatch for $sc: $arch_info"; exit 1; } ;;
              x64)   echo "$arch_info" | grep -q "x86-64\|Intel" || { echo "FAIL: arch mismatch for $sc: $arch_info"; exit 1; } ;;
            esac
          done
          echo "--- MSI format ---"
          for msi in desktop-windows-artifacts/${{ matrix.arch }}/*.msi; do
            test -f "$msi" || { echo "SKIP: no MSI"; break; }
            magic=$(head -c 8 "$msi" | od -An -tx1 | tr -d ' ')
            echo "$magic" | grep -q "d0cf11e0" || { echo "FAIL: not an OLE2/MSI file"; exit 1; }
            echo "OK: $(basename "$msi")"
          done
          echo "SMOKE OK"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mcpmate-windows-${{ matrix.arch }}-msi
          path: |
            desktop-windows-artifacts/${{ matrix.arch }}/*.msi
          if-no-files-found: error
          retention-days: 14
