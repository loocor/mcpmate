name: Desktop (Windows Test)

on:
  workflow_dispatch:
    inputs:
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "msi"
  push:
    branches: [main, dev, refactor/runtime-contract-and-packaging]
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            desktop/src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli
          locked: true

      - name: Build Windows desktop artifacts
        shell: bash
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
        run: |
          chmod +x packaging/desktop/windows-build-tauri-release.sh
          bash packaging/desktop/windows-build-tauri-release.sh \
            --target "${{ matrix.target }}" \
            --bundles "${INPUT_BUNDLES:-msi}" \
            --output-dir "${GITHUB_WORKSPACE}/desktop-windows-artifacts/${{ matrix.arch }}"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcpmate-windows-${{ matrix.arch }}-msi
          path: |
            desktop-windows-artifacts/${{ matrix.arch }}/*.msi
          if-no-files-found: error
          retention-days: 14
