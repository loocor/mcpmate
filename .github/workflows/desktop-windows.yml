name: Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      bundles:
        description: "Tauri bundle types"
        required: false
        default: "msi"
  push:
    branches:
      - main
      - dev
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/desktop-windows.yml"
      - "packaging/desktop/**"
      - "desktop/**"
      - "board/**"
      - "backend/**"

concurrency:
  group: desktop-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            experimental: false
          - arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            experimental: true
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend -> target
            desktop/src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Tauri CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tauri-cli
          locked: true

      - name: Build Windows desktop artifacts
        shell: bash
        env:
          INPUT_BUNDLES: ${{ github.event.inputs.bundles }}
        run: |
          chmod +x packaging/desktop/windows-build-tauri-release.sh
          bash packaging/desktop/windows-build-tauri-release.sh \
            --target "${{ matrix.target }}" \
            --bundles "${INPUT_BUNDLES:-msi}" \
            --output-dir "${GITHUB_WORKSPACE}/desktop-windows-artifacts/${{ matrix.arch }}"

      - name: Smoke test (sidecar arch + MSI format)
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          echo "--- bundle layout ---"
          find "$BUNDLE_DIR" -type f 2>/dev/null | head -40 || true
          echo "--- sidecar architecture ---"
          for sc in bridge.exe mcpmate-core.exe; do
            sc_name="${sc%.exe}"
            bin=$(find "$BUNDLE_DIR" -type f \( -name "$sc" -o -name "${sc_name}-*.exe" \) | head -1) || true
            if [[ -z "$bin" ]]; then
              echo "WARN: sidecar $sc not in bundle, checking sidecar output dir"
              bin="backend/target/sidecars/${sc_name}-${{ matrix.target }}.exe"
              test -f "$bin" || { echo "FAIL: missing sidecar $sc"; exit 1; }
            fi
            echo "$sc found at: $bin"
            arch_info=$(file "$bin")
            echo "$sc: $arch_info"
            case "${{ matrix.arch }}" in
              arm64) echo "$arch_info" | grep -q "ARM64\|aarch64" || { echo "FAIL: arch mismatch for $sc: $arch_info"; exit 1; } ;;
              x64)   echo "$arch_info" | grep -q "x86-64\|Intel" || { echo "FAIL: arch mismatch for $sc: $arch_info"; exit 1; } ;;
            esac
          done
          echo "--- MSI format ---"
          for msi in desktop-windows-artifacts/${{ matrix.arch }}/*.msi; do
            test -f "$msi" || { echo "SKIP: no MSI"; break; }
            magic=$(head -c 8 "$msi" | od -An -tx1 | tr -d ' ')
            echo "$magic" | grep -q "d0cf11e0" || { echo "FAIL: not an OLE2/MSI file"; exit 1; }
            echo "OK: $(basename "$msi")"
          done
          echo "SMOKE OK"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mcpmate-windows-${{ matrix.arch }}-msi
          path: |
            desktop-windows-artifacts/${{ matrix.arch }}/*.msi
          if-no-files-found: error
          retention-days: 14
