# Composite action: Setup desktop build environment
# Common steps for all desktop platform builds: Rust, Bun, Tauri CLI

name: Setup Desktop Build
description: Install Rust toolchain, cache, Bun, and Tauri CLI

inputs:
  rust-target:
    description: "Rust target triple (e.g., x86_64-unknown-linux-gnu)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-target }}

    - name: Cache Rust build
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          backend -> target
          desktop/src-tauri -> target

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install Tauri CLI
      uses: baptiste0928/cargo-install@v3
      with:
        crate: tauri-cli
        locked: true
