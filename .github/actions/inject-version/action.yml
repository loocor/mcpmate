# Composite action: Inject version into tauri.conf.json
# Separates tag-driven release versions from configured non-release versions

name: Inject Version
description: Resolve an app-compatible version and inject it into tauri.conf.json

inputs:
  release-tag:
    description: "Supported release tag. If empty, use the configured version for a non-release build."
    required: false
    default: ""

outputs:
  version:
    description: "Extracted version (without v prefix)"
    value: ${{ steps.inject.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Inject version into tauri.conf.json
      id: inject
      shell: bash
      run: |
        set -euo pipefail

        CONF="desktop/src-tauri/tauri.conf.json"
        if [[ ! -f "$CONF" ]]; then
          echo "::error::tauri.conf.json not found at $CONF" >&2
          exit 1
        fi

        RELEASE_TAG="${{ inputs.release-tag }}"
        if [[ -n "$RELEASE_TAG" ]]; then
          CLASSIFICATION=$(bun packaging/desktop/release-tag.ts --tag "$RELEASE_TAG")
          VERSION=$(jq -r '.appVersion' <<< "$CLASSIFICATION")
        else
          CONFIGURED_VERSION=$(jq -r '.version' "$CONF")
          VERSION=$(bun packaging/desktop/release-tag.ts --configured-version "$CONFIGURED_VERSION")
        fi

        if ! echo "$VERSION" | grep -qE '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
          echo "::error::Resolved app version is not a numeric SemVer version: $VERSION" >&2
          exit 1
        fi

        jq --arg v "$VERSION" '.version = $v' "$CONF" > "$CONF.tmp"
        mv "$CONF.tmp" "$CONF"

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tauri.conf.json version → $VERSION"
